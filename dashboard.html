<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cochi アナリティクス</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --cream:  #faf6f0;
      --beige:  #f0e8da;
      --taupe:  #c8b89a;
      --brown:  #8b6f47;
      --dark:   #3d2b1a;
      --gold:   #c9a84c;
      --text:   #4a3728;
      --white:  #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--dark);
      color: var(--white);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.15em; }
    header .subtitle { font-size: 0.75rem; color: var(--taupe); margin-top: 2px; }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--taupe);
      color: var(--taupe);
      padding: 6px 16px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--taupe); color: var(--dark); }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Page tabs */
    .page-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--white);
      border-radius: 8px;
      padding: 4px;
      border: 1px solid var(--beige);
    }
    .tab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--taupe);
      border-radius: 6px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .tab.active {
      background: var(--dark);
      color: var(--white);
    }
    .tab:not(.active):hover { background: var(--beige); color: var(--dark); }

    .status-bar {
      background: var(--beige);
      border: 1px solid var(--taupe);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--brown);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--taupe); flex-shrink: 0; }
    .status-dot.ok { background: #7cb87c; }
    .status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
    .status-dot.error { background: #c87c7c; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* KPI cards */
    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .kpi-card {
      background: var(--white);
      border-radius: 8px;
      padding: 20px 24px;
      border-top: 3px solid var(--gold);
    }
    .kpi-label { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--taupe); text-transform: uppercase; margin-bottom: 8px; }
    .kpi-value { font-size: 2.2rem; font-weight: 300; color: var(--dark); line-height: 1; }
    .kpi-sub { font-size: 0.75rem; color: var(--taupe); margin-top: 6px; }

    /* Charts */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card {
      background: var(--white);
      border-radius: 8px;
      padding: 24px;
    }
    .card.full { grid-column: 1 / -1; }
    .card h2 {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--taupe);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--beige);
    }
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap.tall { height: 340px; }

    /* Insight funnel */
    .funnel { display: flex; flex-direction: column; gap: 14px; padding: 8px 0; }
    .funnel-row { display: flex; align-items: center; gap: 16px; }
    .funnel-label { width: 160px; font-size: 0.82rem; color: var(--dark); flex-shrink: 0; }
    .funnel-bar-wrap { flex: 1; background: var(--beige); border-radius: 4px; height: 32px; overflow: hidden; }
    .funnel-bar {
      height: 100%;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--white);
      transition: width 0.8s ease;
      min-width: 40px;
    }
    .funnel-count { width: 80px; text-align: right; font-size: 0.8rem; color: var(--taupe); flex-shrink: 0; }

    /* page-only card hidden when not in "all" tab */
    .all-only { transition: opacity 0.2s; }
    .all-only.hidden { display: none; }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--taupe);
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .empty strong { color: var(--brown); display: block; margin-bottom: 8px; font-size: 1rem; }

    @media (max-width: 680px) {
      .kpi-row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .funnel-label { width: 120px; font-size: 0.75rem; }
      .page-tabs { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>cochi Hair&amp;Spa — Analytics</h1>
    <div class="subtitle" id="last-updated">読み込み中...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">更新</button>
</header>

<div class="container">

  <!-- Page filter tabs -->
  <div class="page-tabs">
    <button class="tab active" data-page="all"     onclick="switchTab(this)">全体</button>
    <button class="tab"        data-page="index"   onclick="switchTab(this)">トップページ</button>
    <button class="tab"        data-page="recruit" onclick="switchTab(this)">求人ページ</button>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">データを読み込んでいます...</span>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">総訪問者数</div>
      <div class="kpi-value" id="kpi-total">—</div>
      <div class="kpi-sub">累計ユニークセッション</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">直近7日間</div>
      <div class="kpi-value" id="kpi-7days">—</div>
      <div class="kpi-sub">ユニークセッション</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">検討アクション率</div>
      <div class="kpi-value" id="kpi-consideration">—</div>
      <div class="kpi-sub">認知→検討の転換率</div>
    </div>
  </div>

  <!-- 訪問者数グラフ -->
  <div class="grid">
    <div class="card full">
      <h2>訪問者数推移（過去30日）</h2>
      <div class="chart-wrap">
        <canvas id="chart-visitors"></canvas>
      </div>
    </div>

    <!-- セクション離脱 -->
    <div class="card">
      <h2>セクション別 離脱数</h2>
      <div class="chart-wrap tall" id="exit-wrap">
        <canvas id="chart-exits"></canvas>
      </div>
    </div>

    <!-- インサイトファネル -->
    <div class="card">
      <h2>インサイトカテゴリ推移</h2>
      <div id="funnel-container" class="funnel"></div>
    </div>
  </div>

  <!-- ページ別 + CTA -->
  <div class="grid">
    <div class="card all-only" id="card-pages">
      <h2>ページ別 訪問者数</h2>
      <div class="chart-wrap">
        <canvas id="chart-pages"></canvas>
      </div>
    </div>
    <div class="card" id="card-cta">
      <h2>LINE・応募クリック数</h2>
      <div class="chart-wrap">
        <canvas id="chart-cta"></canvas>
      </div>
    </div>
  </div>

</div>

<script>
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyEHajt85Ke0DBk9SED20zOBQ2QMG6_g2W8HhheyvWXBsF81fEMbHiCgu1wDJvfRXao/exec';

let allData   = null;
let currentPage = 'all';
let chartVisitors, chartExits, chartPages, chartCta;

const COLORS = {
  gold: '#c9a84c', brown: '#8b6f47', taupe: '#c8b89a',
  dark: '#3d2b1a', beige: '#f0e8da', green: '#7cb87c', red: '#c87c7c',
};
const FUNNEL_COLORS = ['#c9a84c', '#8b6f47', '#3d2b1a'];

function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function switchTab(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentPage = btn.dataset.page;

  // ページ別ドーナツは「全体」のみ表示
  const cardPages = document.getElementById('card-pages');
  cardPages.classList.toggle('hidden', currentPage !== 'all');

  // CTAカードを全幅にするかどうか
  const cardCta = document.getElementById('card-cta');
  cardCta.style.gridColumn = currentPage !== 'all' ? '1 / -1' : '';

  if (allData) renderAll(allData[currentPage] || allData.all);
}

async function loadData() {
  setStatus('loading', 'データを取得中...');
  try {
    const res  = await fetch(ENDPOINT + '?action=data');
    allData    = await res.json();
    renderAll(allData[currentPage] || allData.all);
    document.getElementById('last-updated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
    setStatus('ok', 'データを表示しています');
  } catch (err) {
    setStatus('error', 'データ取得に失敗しました: ' + err.message);
  }
}

function renderAll(data) {
  if (!data) return;
  renderKPI(data);
  renderVisitors(data.dailyData || []);
  renderExits(data.sectionExits || []);
  renderFunnel(data.insightFunnel || []);
  if (currentPage === 'all') renderPages(data.pageData || []);
  renderCTA(data.ctaData || []);
}

function renderKPI(data) {
  document.getElementById('kpi-total').textContent = (data.totalVisitors || 0).toLocaleString();
  document.getElementById('kpi-7days').textContent = (data.last7days || 0).toLocaleString();
  const f = (data.insightFunnel || []).find(x => x.label === '検討アクション');
  document.getElementById('kpi-consideration').textContent = f ? f.pct + '%' : '—';
}

function renderVisitors(daily) {
  const ctx = document.getElementById('chart-visitors').getContext('2d');
  if (chartVisitors) chartVisitors.destroy();
  if (!daily.length) { showEmpty('chart-visitors', '訪問データがまだありません'); return; }
  resetCanvas('chart-visitors');
  chartVisitors = new Chart(ctx, {
    type: 'line',
    data: {
      labels: daily.map(d => d.date),
      datasets: [{
        label: '訪問者数',
        data: daily.map(d => d.count),
        borderColor: COLORS.gold,
        backgroundColor: 'rgba(201,168,76,0.1)',
        borderWidth: 2, fill: true, tension: 0.3,
        pointBackgroundColor: COLORS.gold, pointRadius: 3,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#f0e8da' }, ticks: { font:{size:11}, color:'#c8b89a', maxTicksLimit:10 } },
        y: { grid: { color: '#f0e8da' }, ticks: { font:{size:11}, color:'#c8b89a', stepSize:1 }, beginAtZero: true },
      },
    },
  });
}

function renderExits(exits) {
  const ctx = document.getElementById('chart-exits').getContext('2d');
  if (chartExits) chartExits.destroy();
  if (!exits.length) { showEmpty('chart-exits', '離脱データがまだありません'); return; }
  resetCanvas('chart-exits');
  const top = exits.slice(0, 12);
  chartExits = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(e => e.section),
      datasets: [{
        label: '離脱数',
        data: top.map(e => e.count),
        backgroundColor: top.map((_, i) => i < 3 ? COLORS.brown : COLORS.taupe),
        borderRadius: 3,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#f0e8da' }, ticks: { font:{size:11}, color:'#c8b89a' }, beginAtZero: true },
        y: { grid: { display: false }, ticks: { font:{size:11}, color:'#4a3728' } },
      },
    },
  });
}

function renderFunnel(funnel) {
  const container = document.getElementById('funnel-container');
  if (!funnel.length) {
    container.innerHTML = '<div class="empty"><strong>データなし</strong>まだインサイトデータが<br>蓄積されていません</div>';
    return;
  }
  container.innerHTML = funnel.map((item, i) => `
    <div class="funnel-row">
      <div class="funnel-label">${item.label}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${item.pct || 0}%;background:${FUNNEL_COLORS[i] || COLORS.taupe}">${item.pct}%</div>
      </div>
      <div class="funnel-count">${item.count.toLocaleString()}件</div>
    </div>
  `).join('');
}

function renderPages(pages) {
  const ctx = document.getElementById('chart-pages').getContext('2d');
  if (chartPages) chartPages.destroy();
  if (!pages.length) { showEmpty('chart-pages', 'ページデータがまだありません'); return; }
  resetCanvas('chart-pages');
  chartPages = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: pages.map(p => p.page === 'index' ? 'トップページ' : '求人ページ'),
      datasets: [{ data: pages.map(p => p.count), backgroundColor: [COLORS.gold, COLORS.brown], borderWidth: 0 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font:{size:12}, color:'#4a3728', padding:16 } } },
    },
  });
}

function renderCTA(cta) {
  const ctx = document.getElementById('chart-cta').getContext('2d');
  if (chartCta) chartCta.destroy();
  if (!cta.length) { showEmpty('chart-cta', 'CTAクリックデータがまだありません'); return; }
  resetCanvas('chart-cta');
  const labels = { line: 'LINE予約', recruit: '応募・見学', instagram: 'Instagram' };
  chartCta = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: cta.map(c => labels[c.type] || c.type),
      datasets: [{
        label: 'クリック数',
        data: cta.map(c => c.count),
        backgroundColor: [COLORS.green, COLORS.gold, COLORS.taupe],
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font:{size:12}, color:'#4a3728' } },
        y: { grid: { color: '#f0e8da' }, ticks: { font:{size:11}, color:'#c8b89a' }, beginAtZero: true },
      },
    },
  });
}

function resetCanvas(id) {
  const canvas = document.getElementById(id);
  canvas.style.display = '';
  const old = canvas.parentElement.querySelector('.empty');
  if (old) old.remove();
}

function showEmpty(canvasId, msg) {
  const canvas = document.getElementById(canvasId);
  const wrap   = canvas.parentElement;
  canvas.style.display = 'none';
  const existing = wrap.querySelector('.empty');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'empty';
  div.innerHTML = '<strong>データなし</strong>' + msg;
  wrap.appendChild(div);
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
